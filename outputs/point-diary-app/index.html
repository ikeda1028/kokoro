<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Point Diary</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="ルーム">
        <div class="brand">
          <div class="brand-mark">P</div>
          <div>
            <h1>Point Diary</h1>
            <p id="todayLabel"></p>
          </div>
        </div>

        <section class="panel compact">
          <label for="displayName">名前</label>
          <input id="displayName" type="text" maxlength="24" autocomplete="name" />
          <p id="syncStatus" class="sync-status">Local</p>
        </section>

        <section class="panel">
          <div class="tabs" role="tablist" aria-label="ルーム種別">
            <button id="personalTab" class="tab active" type="button">個人</button>
            <button id="groupTab" class="tab" type="button">グループ</button>
          </div>

          <div id="personalForm" class="room-form">
            <p id="personalStatus" class="form-note"></p>
            <button id="enterPersonal" class="primary full" type="button">個人ルームへ</button>
            <button id="showPersonalRegister" class="secondary full hidden" type="button">個人を新規登録</button>
          </div>

          <div id="personalRegisterForm" class="room-form hidden">
            <p class="form-note">個人用の名前を登録してください。</p>
            <label for="personalRegisterName">名前</label>
            <input id="personalRegisterName" type="text" maxlength="24" autocomplete="name" placeholder="あなたの名前" />
            <button id="registerPersonal" class="primary full" type="button">登録して始める</button>
            <button id="cancelPersonalRegister" class="secondary full" type="button">戻る</button>
          </div>

          <div id="groupForm" class="room-form hidden">
            <label for="groupId">グループID</label>
            <input id="groupId" type="text" maxlength="32" placeholder="family-2026" />
            <label for="groupPassword">PW</label>
            <input id="groupPassword" type="password" maxlength="32" placeholder="共有PW" />
            <button id="enterGroup" class="primary full" type="button">入室</button>
            <p class="form-note">未登録のグループIDは新規登録画面へ進みます。</p>
          </div>

          <div id="groupRegisterForm" class="room-form hidden">
            <p id="groupRegisterSummary" class="form-note"></p>
            <label for="groupRegisterName">投稿者名</label>
            <input id="groupRegisterName" type="text" maxlength="24" autocomplete="name" placeholder="グループで使う名前" />
            <label for="groupRegisterTitle">表示名</label>
            <input id="groupRegisterTitle" type="text" maxlength="32" placeholder="家族・チーム名など" />
            <button id="registerGroup" class="primary full" type="button">登録して入室</button>
            <button id="cancelGroupRegister" class="secondary full" type="button">戻る</button>
          </div>
        </section>

        <section class="panel qr-panel">
          <div class="section-title">
            <h2>QR</h2>
            <span id="qrStatus" class="pill">SPECIAL-100</span>
          </div>
          <div class="qr-visual">
            <img id="qrImage" src="./assets/qr-stars.png" alt="" />
            <video id="qrVideo" playsinline muted></video>
          </div>
          <div class="button-row">
            <button id="startQr" type="button">読み取り</button>
            <button id="stopQr" type="button">停止</button>
          </div>
          <div class="manual-qr">
            <input id="manualQr" type="text" placeholder="QRコード" />
            <button id="applyQr" type="button">追加</button>
          </div>
          <div id="heartExchange" class="heart-exchange hidden">
            <button id="sendHeart" class="heart-button" type="button" aria-label="ハートを送る">♥</button>
            <div class="heart-meter">
              <strong id="heartCount">0</strong>
              <span>送信</span>
              <p id="heartStatus">ハート待機中</p>
            </div>
            <div id="heartEvolution" class="heart-evolution" aria-label="ハート進化"></div>
          </div>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="roomMode">Personal</p>
            <h2 id="roomTitle">個人ルーム</h2>
          </div>
          <div class="score-strip">
            <div>
              <span>今日</span>
              <strong id="todayPoints">0</strong>
            </div>
            <div>
              <span>今月</span>
              <strong id="monthPoints">0</strong>
            </div>
            <div>
              <span>投稿</span>
              <strong id="postCount">0</strong>
            </div>
          </div>
        </header>

        <section class="composer">
          <div class="icon-picker" aria-label="投稿アイコン">
            <button class="icon-option active" type="button" data-icon="./assets/icons/car.png">
              <img src="./assets/icons/car.png" alt="" />
              <span>車</span>
            </button>
            <button class="icon-option" type="button" data-icon="./assets/icons/home.png">
              <img src="./assets/icons/home.png" alt="" />
              <span>家</span>
            </button>
            <button class="icon-option" type="button" data-icon="./assets/icons/moon.png">
              <img src="./assets/icons/moon.png" alt="" />
              <span>月</span>
            </button>
            <button class="icon-option" type="button" data-icon="./assets/icons/rain.png">
              <img src="./assets/icons/rain.png" alt="" />
              <span>雨</span>
            </button>
            <button class="icon-option" type="button" data-icon="./assets/icons/mole.png">
              <img src="./assets/icons/mole.png" alt="" />
              <span>土</span>
            </button>
          </div>
          <div class="composer-meta">
            <label for="recordDate">記録日</label>
            <input id="recordDate" type="date" />
          </div>
          <textarea id="postText" maxlength="180" placeholder="今日の記録"></textarea>
          <div class="composer-actions">
            <label class="file-chip" for="photoInput">写真</label>
            <input id="photoInput" type="file" accept="image/*" />
            <span id="photoName"></span>
            <button id="addPost" class="primary" type="button">投稿</button>
          </div>
        </section>

        <section class="content-grid">
          <section class="calendar-section">
            <div class="section-title">
              <h2 id="calendarTitle">カレンダー</h2>
              <div class="button-row tight">
                <button id="prevMonth" type="button" aria-label="前の月">‹</button>
                <button id="nextMonth" type="button" aria-label="次の月">›</button>
              </div>
            </div>
            <div class="week-row" aria-hidden="true">
              <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
            </div>
            <div id="calendarGrid" class="calendar-grid"></div>
          </section>

          <section class="insight-section">
            <div class="section-title">
              <h2>AI</h2>
              <button id="refreshAi" type="button">更新</button>
            </div>
            <div id="aiInsight" class="ai-card"></div>
          </section>
        </section>

        <section class="timeline-section">
          <div class="section-title">
            <h2>タイムライン</h2>
            <span id="lockHint" class="muted"></span>
          </div>
          <div id="timeline" class="timeline"></div>
        </section>
      </section>
    </main>

    <template id="postTemplate">
      <article class="post-card">
        <div class="post-head">
          <div>
            <strong class="post-author"></strong>
            <span class="post-time"></span>
          </div>
          <span class="post-points"></span>
        </div>
        <p class="post-text"></p>
        <img class="post-image" alt="" />
        <button class="delete-post" type="button">削除</button>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
